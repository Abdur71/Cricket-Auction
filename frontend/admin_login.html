<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet" />
<style>
:root {
    --bg-1: #071019;
    --bg-2: #0d1730;
    --panel: rgba(10, 18, 35, 0.84);
    --stroke: rgba(255, 255, 255, 0.12);
    --text: #edf3ff;
    --muted: #95a8c4;
    --cyan: #3be2ff;
    --gold: #f7c95b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    background:
        radial-gradient(1000px 520px at 8% 0%, rgba(59, 226, 255, 0.15), transparent 58%),
        radial-gradient(1200px 700px at 100% 0%, rgba(247, 201, 91, 0.14), transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
}
.login-card {
    width: min(520px, 100%);
    padding: 28px;
    border-radius: 28px;
    background: var(--panel);
    border: 1px solid var(--stroke);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
    backdrop-filter: blur(16px);
}
.login-card h1 {
    font-family: 'Orbitron', sans-serif;
    color: var(--gold);
    letter-spacing: 0.12em;
    font-size: clamp(1.5rem, 3vw, 2rem);
}
.login-card p {
    margin-top: 12px;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.5;
}
.form-grid {
    display: grid;
    gap: 16px;
    margin-top: 22px;
}
.field-group { display: grid; gap: 8px; }
.field-group label {
    color: var(--muted);
    font-size: 0.92rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
}
.control {
    border: 1px solid var(--stroke);
    border-radius: 16px;
    background: rgba(4, 10, 22, 0.75);
}
.control input {
    width: 100%;
    border: 0;
    outline: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 1.05rem;
    padding: 14px 16px;
}
.actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.btn {
    border: 0;
    border-radius: 16px;
    min-height: 52px;
    padding: 0 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    cursor: pointer;
}
.btn.primary {
    color: #09111f;
    background: linear-gradient(135deg, #ffe083, var(--gold));
}
.btn.secondary {
    color: #fff;
    background: linear-gradient(135deg, #00cfe8, #1eb7ff);
}
.status {
    margin-top: 16px;
    min-height: 1.5em;
    color: var(--muted);
    font-size: 1rem;
}
.status.error { color: #ff9fb0; }
</style>
</head>
<body>
<main class="login-card">
    <h1>ADMIN LOGIN</h1>
    <p>Enter the admin username and password to open the secure admin panel.</p>

    <div class="form-grid">
        <div class="field-group">
            <label for="usernameInput">Username</label>
            <div class="control">
                <input type="text" id="usernameInput" value="admin" placeholder="Enter admin username" />
            </div>
        </div>

        <div class="field-group">
            <label for="passwordInput">Password</label>
            <div class="control">
                <input type="password" id="passwordInput" placeholder="Enter admin password" />
            </div>
        </div>

        <div class="actions">
            <button class="btn primary" id="loginBtn" type="button">LOGIN</button>
        </div>
    </div>

    <div class="status" id="statusText">Use username <strong>admin</strong> to sign in.</div>
</main>

<script>
async function redirectIfAuthenticated() {
    try {
        const response = await fetch("/api/auth/session", { cache: "no-store" });
        const data = await response.json();
        if (data.authenticated) {
            window.location.replace("/admin_app.html");
        }
    } catch (error) {
    }
}

const usernameInput = document.getElementById("usernameInput");
const passwordInput = document.getElementById("passwordInput");
const loginBtn = document.getElementById("loginBtn");
const statusText = document.getElementById("statusText");

function setStatus(message, isError = false) {
    statusText.textContent = message;
    statusText.classList.toggle("error", Boolean(isError));
}

async function login() {
    try {
        const response = await fetch("/api/admin/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: usernameInput.value.trim(),
                password: passwordInput.value
            })
        });

        const rawText = await response.text();
        let data = {};
        try {
            data = rawText ? JSON.parse(rawText) : {};
        } catch (error) {
            setStatus(`Login request failed (${response.status}).`, true);
            return;
        }

        if (data.error) {
            setStatus(data.error, true);
            return;
        }

        window.location.href = "/admin_app.html";
    } catch (error) {
        setStatus("Could not log in.", true);
    }
}

redirectIfAuthenticated();
loginBtn.addEventListener("click", login);
passwordInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        login();
    }
});
</script>
</body>
</html>
